# fly.toml — Realtime Chat server
#
# Placed at the monorepo root so the Docker build context sees the
# `.yarn/`, `yarn.lock`, and `packages/` directories that the Dockerfile
# needs to resolve the @rtc/contracts workspace.
#
# Rename `app` below to something unique (Fly app names are global).

app = "rtc-chat"
primary_region = "bom"  # Mumbai — closest Fly region for India
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "apps/server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  # Secrets (DATABASE_URL, REDIS_URL, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET)
  # are injected via `fly secrets set` — never commit them here.

[http_service]
  internal_port = 4000
  force_https = true
  # Keep the machine warm — a cold start on a WebSocket handshake is a bad
  # first impression for a realtime demo.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

  # /health is a tiny JSON endpoint defined in src/index.ts
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
