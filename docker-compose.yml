services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rtc
      POSTGRES_PASSWORD: rtc
      POSTGRES_DB: rtc
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rtc -d rtc']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://rtc:rtc@postgres:5432/rtc
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev_access_secret_please_change_32_bytes
      JWT_REFRESH_SECRET: dev_refresh_secret_please_change_32_bytes
    ports:
      - '4000:4000'

volumes:
  pgdata:
