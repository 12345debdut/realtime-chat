name: Deploy server to Fly.io

on:
  push:
    branches: [main]
    paths:
      # Only deploy when something the server actually depends on changed.
      - 'apps/server/**'
      - 'packages/contracts/**'
      - 'fly.toml'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch: # manual trigger from the Actions tab

concurrency:
  group: deploy-server
  cancel-in-progress: false # never cancel a deploy mid-flight

jobs:
  # Gate deploy on CI — we don't ship red builds. The `workflow_run` trigger
  # would be an alternative, but re-running the checks here is cheap (cached
  # yarn install) and keeps the deploy workflow self-contained.
  deploy:
    name: fly deploy
    runs-on: ubuntu-latest
    # Attach to an environment so you can enforce a manual approval in
    # repo Settings → Environments → production → Required reviewers.
    environment: production
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: corepack enable

      - name: Cache yarn install
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install deps
        run: yarn install --immutable

      - name: Build @rtc/contracts
        run: yarn build:contracts

      # Quick smoke: typecheck + test server only. CI ran the full matrix on
      # the merge commit already; this guards against environment drift.
      - name: Server typecheck + tests
        run: |
          yarn workspace @rtc/server typecheck
          yarn workspace @rtc/server test

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
