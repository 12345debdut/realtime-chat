version: 2

updates:
  # Root + workspaces. Yarn 3 workspaces mean dependabot updates the root
  # lockfile even when a sub-package manifest changes.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Kolkata
    open-pull-requests-limit: 10
    labels: [dependencies]
    commit-message:
      prefix: deps
      include: scope
    groups:
      # Batch minor/patch bumps so reviewers don't drown in PRs.
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-patch:
        dependency-type: production
        update-types: [patch]
    ignore:
      # React Native upgrades are big-bang events — manual only.
      - dependency-name: react-native
      - dependency-name: react
      - dependency-name: '@react-native/*'
      # WatermelonDB native module — upgrade manually with a pod install pass.
      - dependency-name: '@nozbe/watermelondb'

  # GitHub Actions themselves — keep our workflow actions on fresh versions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
      include: scope

  # Dockerfile base image for the server.
  - package-ecosystem: docker
    directory: /apps/server
    schedule:
      interval: monthly
    labels: [dependencies, docker]
    commit-message:
      prefix: docker
      include: scope
